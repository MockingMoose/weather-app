<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="text" inputmode="numeric" pattern="\d{5}" id="inputZIP" maxlength="5" placeholder="ZIP Code" autofocus/>
    <input type="submit" id="submitBtn">
    <h1 id="city"></h1>
    <p id="weatherInfo"></p>
    <div id="survivalStatus"></div>
    

    <script src="script.js"></script>
</body>
</html>
